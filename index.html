<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprende y Juega | Plataforma Educativa</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main-style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <header class="main-header">
        <h1>✨ Aprende y Juega ✨</h1>
        <div id="stats-bar" class="hidden">
            <span id="score-display">Puntos: 0</span>
            <div id="lives-display"></div>
        </div>
    </header>

    <main id="app-container">
        <section id="menu-principal" class="game-grid">
            <div class="game-card" data-module="animales">
                <div class="card-icon">🐶</div>
                <h3>Mundo Animal</h3>
                <p>Identificar y Arrastrar</p>
            </div>
            <div class="game-card" data-module="cuerpo" style="background-color: #BBDEFB;">
                <span style="font-size: 5rem;">🧒</span>
                <h3>Mi Cuerpo</h3>
                <p>Anatomía Básica</p>
            </div>
            <div class="game-card" data-module="colores_formas" style="background-color: #E1BEE7;">
                <span style="font-size: 5rem;">🔴</span>
                <h3>Colores y Formas</h3>
            </div>
            <div class="game-card" data-module="emociones" style="background-color: #FFCDD2;">
                <span style="font-size: 5rem;">😊</span>
                <h3>Emociones</h3>
            </div>
            <div class="game-card" data-module="math" style="background-color: #FFF9C4;">
                <span style="font-size: 5rem;">🔢</span>
                <h3>Matemáticas</h3>
            </div>
            <div class="game-card" data-module="vehiculos" style="background-color: #FFECB3;">
                <span style="font-size: 5rem;">🚀</span>
                <h3>Transportes</h3>
            </div>
        </section>

        <section id="game-canvas" class="hidden">
            <button id="btn-back" style="margin-bottom: 20px; padding: 10px 20px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; border: none; background: #eee; font-weight: bold; color: #555;">⬅ Volver al Menú</button>
            <div id="game-content"></div>
        </section>
    </main>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
